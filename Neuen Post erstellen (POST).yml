info:
  name: Neuen Post erstellen (POST)
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/posts"
  body:
    type: json
    data: '{ "title": "Mein Test", "body": "Inhalt", "userId": 1 }'
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status ist 201 Created", function() {
          expect(res.getStatus()).to.equal(201);
        });

        test("Neue ID wurde vergeben", function() {
          const body = res.getBody();
          expect(body).to.have.property("id");
          expect(body.id).to.equal(101);
        });

        test("Gesendete Daten sind in Response", function() {
          const body = res.getBody();
          expect(body.title).to.equal("Mein Test");
          expect(body.userId).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
