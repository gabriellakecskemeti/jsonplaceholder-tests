info:
  name: 12-E2E-post-create
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/posts"
  body:
    type: json
    data: '{ "title": "E2E Test Post", "body": "Wird erstellt und gelöscht", "userId": 1 }'
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("e2ePostId", res.getBody().id);
        console.log("e2ePostId: " + res.getBody().id);
    - type: tests
      code: |-
        test("POST: Status 201", function() {
          expect(res.getStatus()).to.equal(201);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
