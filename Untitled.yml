info:
  name: Untitled
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/posts"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status ist 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response ist ein Array mit 100 Posts", function() {
          const body = res.getBody();
          expect(body).to.be.an("array");
          expect(body).to.have.length(100);
        });

        test("Erster Post hat korrekte Struktur", function() {
          const post = res.getBody()[0];
          expect(post).to.have.property("userId");
          expect(post).to.have.property("id");
          expect(post).to.have.property("title");
          expect(post).to.have.property("body");
        });

        test("Content-Type ist JSON", function() {
          expect(res.getHeader("content-type"))
            .to.contain("application/json");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
