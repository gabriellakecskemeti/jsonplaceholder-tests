info:
  name: 01-GET-one-post-by-ID
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/posts/1"
  headers:
    - name: Accept
      value: application/json
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Post has ID 1", function() {
          const body = res.getBody();
          expect(body.id).to.equal(1);
        });

        test("Post is one Object with all Fields", function() {
          const body = res.getBody();
          expect(body).to.be.an("object");
          expect(body).to.have.all.keys("userId","id","title","body");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
