http:
  method: GET
  url: "{{baseUrl}}/posts/{{createdPostId}}"
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        // Prüfen ob die Variable existiert
        const postId = bru.getVar("createdPostId");
        console.log("Verwende Post-ID: " + postId);
    - type: tests
      code: |-
        test("Status ist 404 (Post existiert nicht wirklich)", function() {
          expect(res.getStatus()).to.equal(404);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
