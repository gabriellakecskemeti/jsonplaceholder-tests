info:
  name: Einzelnen Post abrufen (GET by ID)
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/posts/1"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status ist 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Post hat ID 1", function() {
          const body = res.getBody();
          expect(body.id).to.equal(1);
        });

        test("Post ist ein Objekt mit allen Feldern", function() {
          const body = res.getBody();
          expect(body).to.be.an("object");
          expect(body).to.have.all.keys("userId","id","title","body");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
