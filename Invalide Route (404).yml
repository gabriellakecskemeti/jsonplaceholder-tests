http:
  method: GET
  url: "{{baseUrl}}/gibtesnicht"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status ist 404 NOT FOUND", function() {
          expect(res.getStatus()).to.equal(404);
        });

        test("Response ist kein gültiges Datenobjekt", function() {
          const body = res.getBody();
          // Keine echten Daten in der Antwort
          expect(body).to.not.have.property("id");
          expect(body).to.not.have.property("title");
        });

settings:
