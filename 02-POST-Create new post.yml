info:
  name: 02-POST-Create new post
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/posts"
  body:
    type: json
    data: '{ "title": "My Test", "body": "IContent", "userId": 1 }'
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 201 Created", function() {
          expect(res.getStatus()).to.equal(201);
        });

        test("New ID was assigned", function() {
          const body = res.getBody();
          expect(body).to.have.property("id");
          expect(body.id).to.equal(101);
        });

        test("Sent data are in the response", function() {
          const body = res.getBody();
          expect(body.title).to.equal("My Test");
          expect(body.userId).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
