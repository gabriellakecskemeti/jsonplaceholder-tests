info:
  name: 03-PUT-Update-post
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/posts/1"
  body:
    type: json
    data: '{ "id": 1, "title": "Update", "body": "New content", "userId": 1 }'
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });


        test("Updated data is in the response", function() {
          const body = res.getBody();
          expect(body.title).to.equal("Update");
          expect(body.body).to.equal("New content");
          expect(body.userId).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
