info:
  name: 04-PATCH-Change-part-of-post
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/posts/1"
  body:
    type: json
    data: '{ "title": "Only titel is changed" }'
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status ist 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });


        test("Updated data are in Respond", function() {
          const body = res.getBody();
          expect(body.title).to.equal("Only titel is changed");
          expect(body.body).to.equal("quia et suscipit\nsuscipit recusandae consequuntur expedita et cum\nreprehenderit molestiae ut ut quas totam\nnostrum rerum est autem sunt rem eveniet architecto");
          expect(body.userId).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
