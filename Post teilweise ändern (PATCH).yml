info:
  name: Post teilweise ändern (PATCH)
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/posts/1"
  body:
    type: json
    data: '{ "title": "Nur Titel geändert" }'
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status ist 200 OK", function() {
          expect(res.getStatus()).to.equal(200);
        });


        test("Aktualisierte Daten sind in Response", function() {
          const body = res.getBody();
          expect(body.title).to.equal("Nur Titel geändert");
          expect(body.body).to.equal("quia et suscipit\nsuscipit recusandae consequuntur expedita et cum\nreprehenderit molestiae ut ut quas totam\nnostrum rerum est autem sunt rem eveniet architecto");
          expect(body.userId).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
